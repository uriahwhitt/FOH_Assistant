# Calibrated against: Glam Metal genre profile
#
# Target: All weighted band deviations should remain at or below the 3.0 dB
# recommendation trigger. Initial board state is designed to produce a balanced
# frequency response that matches the Glam Metal targets across all seven bands.
#
# Per-band calibration notes (initial state):
#   sub_bass  weight=0.6 — Kick and Bass DI faders kept moderate (-3 to -4 dB)
#                          to avoid sub buildup. Raw deviations stay well below
#                          threshold (0.6 weighting gives 5 dB headroom).
#   bass      weight=0.8 — Bass DI at -4 dB balanced against Kick at -3 dB;
#                          raw deviation target ≤+2 dB (weighted ≤1.6).
#   low_mid   weight=1.0 — No aggressive low-mid cuts applied; guitars neutral.
#   mid       weight=1.1 — Guitars and vocals balanced; no presence cuts.
#   high_mid  weight=1.3 — Highest-weighted band. Guitars at -2 to -3 dB with
#                          neutral EQ keep high-mid in check.
#   presence  weight=1.2 — Lead Vocal at -1 dB contributes presence. No cuts
#                          in presence range. Raw target ≤-2 dB (weighted ≤2.4).
#   air       weight=0.9 — Guitar 1, Guitar 2, and Lead Vocal each carry
#                          EQ presence up to 10 kHz. An additional +1.5 dB air
#                          shelf on Guitar 1 and Guitar 2 at 12 kHz ensures the
#                          air band contribution does not drop below threshold.
#                          Without this, air deficit can reach -4.4 dB raw
#                          (weighted -3.96), which exceeds the 3.0 trigger.
#
# Channel-level rationale:
#   Kick (ch1)  : -3 dB, neutral EQ — punchy without over-powering sub-bass
#   Snare (ch2) : -4 dB, neutral EQ — body and snap balanced
#   Hi-Hat (ch3): -6 dB — supportive level, not a culprit
#   Overheads   : -8 dB — natural room air, low contribution to problematic bands
#   Drum Vocal  : -10 dB open — well below active threshold, ignored by engine
#   Bass DI     : -4 dB, neutral EQ — balanced against Kick
#   Bassist Voc : -5 dB open — below active threshold
#   Guitar 1    : -2 dB, 12kHz +1.5 dB air shelf — main air contributor
#   Guitar 2    : -3 dB, 12kHz +1.5 dB air shelf — second air contributor
#   Keys (ch11) : -4 dB — low priority, no problematic EQ
#   Guitar 3    : muted — inactive
#   Keys Vocal  : -5 dB open — below active threshold
#   Lead Vocal  : -1 dB — primary presence/air contributor, no EQ cuts

name: "Clean Show"
description: >
  Well-run show calibrated against the Glam Metal genre profile — board stays
  balanced, all weighted band deviations remain within the 3.0 dB trigger
  threshold. Guitar air-band boosts (+1.5 dB at 12 kHz) prevent the air band
  from dropping into deficiency. Engine should generate minimal or no
  recommendations when run against a well-mixed audio source.
  Use as a negative-test baseline: if recs fire on this scenario, tune
  thresholds down.
duration_s: 300

initial_state:
  channels:
    1:  { fader_db: -3.0, eq: [{band: 1, gain: 0.0, freq: 60},  {band: 2, gain: 0.0, freq: 200},  {band: 3, gain: 0.0, freq: 2500}, {band: 4, gain: 0.0, freq: 10000}] }   # Kick
    2:  { fader_db: -4.0, eq: [{band: 1, gain: 0.0, freq: 150}, {band: 2, gain: 0.0, freq: 300},  {band: 3, gain: 0.0, freq: 5000}, {band: 4, gain: 0.0, freq: 10000}] }   # Snare
    3:  { fader_db: -6.0 }                                                                                                                                                    # Hi-Hat
    4:  { fader_db: -8.0 }                                                                                                                                                    # Overhead L
    5:  { fader_db: -8.0 }                                                                                                                                                    # Overhead R
    6:  { fader_db: -10.0, muted: false }                                                                                                                                     # Drum Vocal — open, quiet
    7:  { fader_db: -4.0, eq: [{band: 1, gain: 0.0, freq: 80},  {band: 2, gain: 0.0, freq: 250},  {band: 3, gain: 0.0, freq: 1000}, {band: 4, gain: 0.0, freq: 5000}] }   # Bass DI
    8:  { fader_db: -5.0, muted: false }                                                                                                                                      # Bassist Vocal
    9:  { fader_db: -2.0, eq: [{band: 1, gain: 0.0, freq: 80},  {band: 2, gain: 0.0, freq: 315},  {band: 3, gain: 0.0, freq: 2500}, {band: 4, gain: 1.5, freq: 12000}] }  # Guitar 1 — +1.5 dB air shelf prevents air deficiency
    10: { fader_db: -3.0, eq: [{band: 1, gain: 0.0, freq: 80},  {band: 2, gain: 0.0, freq: 315},  {band: 3, gain: 0.0, freq: 2500}, {band: 4, gain: 1.5, freq: 12000}] }  # Guitar 2 — +1.5 dB air shelf supports air band
    11: { fader_db: -4.0 }                                                                                                                                                    # Keys
    12: { fader_db: -10.0, muted: true }                                                                                                                                      # Guitar 3 — muted, Keys active
    13: { fader_db: -5.0,  muted: false }                                                                                                                                     # Keys Vocal
    14: { fader_db: -1.0 }                                                                                                                                                    # Lead Vocal
  main_fader_db: 0.0

timeline:
  # All moves are ≤ 0.5 dB — well under the 2 dB drift threshold and
  # 3 dB rate-of-change suppression threshold. Engine should stay silent.

  - at_s: 60
    action: fader_move
    channel: 9
    target_db: -0.5
    note: "Lead Vocal subtle pull-up (+0.5 dB) — below all thresholds"

  - at_s: 120
    action: fader_move
    channel: 7
    target_db: -3.5
    note: "Bass DI slight push (+0.5 dB) — below all thresholds"

  - at_s: 180
    action: fader_move
    channel: 8
    target_db: -2.5
    note: "Guitar 2 slight trim (-0.5 dB) — below all thresholds"

  - at_s: 240
    action: fader_move
    channel: 9
    target_db: -1.0
    note: "Lead Vocal returned to initial — zero net drift"
