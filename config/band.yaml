band: "Nostalgic Knights"
default_genre: "Glam Metal"

x32:
  ip: "127.0.0.1"
  port: 10023
  poll_interval_ms: 500
  keepalive_interval_s: 8

audio:
  device_name_match: "Wireless Microphone RX"
  preferred_sample_rate: 48000
  channels: 1
  buffer_seconds: 2

channels:
  1:
    label: "Kick"
    type: instrument
  4:
    label: "Drum Rack"
    type: instrument
    notes: "Toms"
  5:
    label: "Floor Tom"
    type: instrument
  6:
    label: "Acoustic Guitar"
    type: instrument
    paired_channel: 15
    notes: "Ken's alternate — active on songs where keys not needed, muted otherwise"
  7:
    label: "Guitar 1"
    type: instrument
    role: shared_lead_rhythm
    notes: "Trades lead/solo with Guitar 2 — solo suppression applies to either"
  8:
    label: "Guitar 2"
    type: instrument
    role: shared_lead_rhythm
    notes: "Trades lead/solo with Guitar 1 — solo suppression applies to either"
  9:
    label: "Lead Vocal"
    type: vocal
    usage: primary_lead
    priority: very_high
  10:
    label: "Drum Vocal"
    type: vocal
    usage: sparse
    inactive_threshold_db: -35
    lead_songs: ["Fight for Your Right"]
    notes: "Mitch (drummer) — open all show, active only on FFYR (set 2 alternate)"
  11:
    label: "Bassist Vocal"
    type: vocal
    usage: backup_and_lead
    inactive_threshold_db: -35
    lead_songs: ["Kryptonite", "Sharp Dressed Man", "Fire"]
    notes: "Eric (bassist) — lead on Kryptonite, Sharp Dressed Man, Fire. Mix with care on Kryptonite."
  12:
    label: "Keys Vocal"
    type: vocal
    usage: backup_and_lead
    inactive_threshold_db: -35
    lead_songs: ["Can't Get Enough", "Gimme Three Steps", "Lay Down Sally", "Lonely Ole Night", "Blister in the Sun"]
    notes: "Ken (keys/acoustic) — lead on Can't Get Enough, Gimme Three Steps, Lay Down Sally and select alternates"
  13:
    label: "Bass"
    type: instrument
  15:
    label: "Keys"
    type: instrument
    paired_channel: 6
    notes: "Primary instrument — muted when Ken plays acoustic on ch 6"

frequency_fingerprints:
  Kick:
    fundamental: [50, 80]
    body: [80, 150]
    click: [2000, 4000]
    mud_zone: [300, 500]

  Drum Rack:
    primary: [100, 250]
    attack: [3000, 6000]

  Floor Tom:
    primary: [60, 120]
    attack: [3000, 5000]

  Acoustic Guitar:
    body: [150, 400]
    sparkle: [2000, 6000]
    air: [8000, 16000]

  Guitar 1:
    body: [200, 1000]
    bite: [2000, 5000]

  Guitar 2:
    body: [200, 1000]
    bite: [2000, 5000]

  Lead Vocal:
    primary: [100, 4000]
    intelligibility: [1000, 4000]
    sibilance: [5000, 9000]

  Drum Vocal:
    primary: [100, 4000]
    intelligibility: [1000, 4000]

  Bassist Vocal:
    primary: [100, 4000]
    intelligibility: [1000, 4000]

  Keys Vocal:
    primary: [100, 4000]
    intelligibility: [1000, 4000]

  Bass:
    primary: [40, 250]
    definition: [700, 1000]
    attack: [2000, 4000]

  Keys:
    bass_register: [60, 250]
    body: [250, 1000]
    brilliance: [2000, 5000]

band_overrides:
  global:
    notes: "Kick consistently runs heavy across all profiles — allow extra weight below 80Hz"
  AOR:
    notes: "Keys player runs slightly brighter — allow +1dB air vs template"
  Heavy Metal:
    frequency_targets:
      high_mid: +3

thresholds:
  recommendation_trigger_db: 3.0
  lufs_trigger_db: 2.0
  baseline_drift_trigger_db: 2.0
  rate_of_change_suppress_db: 3.0
  rate_of_change_window_s: 5
  rate_of_change_rms_db: 4.0
  rate_of_change_rms_window_s: 2
  suppression_duration_s: 60
  recommendation_cooldown_s: 60
  transition_grace_seconds: 8
  adjustment_detect_fader_db: 0.5
  adjustment_detect_eq_db: 0.5
  adjustment_detect_freq_hz: 10
