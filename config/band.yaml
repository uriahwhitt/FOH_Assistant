band: "Nostalgic Knights"
default_genre: "Glam Metal"

x32:
  ip: "127.0.0.1"
  port: 10023
  poll_interval_ms: 500
  keepalive_interval_s: 8

audio:
  device_name_match: "CABLE Output (VB-Audio Virtual Cable)"
  preferred_sample_rate: 48000
  channels: 1
  buffer_seconds: 2

channels:
  1:
    label: "Kick"
    type: instrument
  4:
    label: "Drum Rack"
    type: instrument
    notes: "Toms"
  5:
    label: "Floor Tom"
    type: instrument
  6:
    label: "Acoustic Guitar"
    type: instrument
    paired_channel: 15
    notes: "Ken's alternate — active on songs where keys not needed, muted otherwise"
  7:
    label: "Guitar 1"
    type: instrument
    role: shared_lead_rhythm
    notes: "Trades lead/solo with Guitar 2 — solo suppression applies to either"
  8:
    label: "Guitar 2"
    type: instrument
    role: shared_lead_rhythm
    notes: "Trades lead/solo with Guitar 1 — solo suppression applies to either"
  9:
    label: "Lead Vocal"
    type: vocal
    usage: primary_lead
    priority: very_high
  10:
    label: "Drum Vocal"
    type: vocal
    usage: sparse
    inactive_threshold_db: -35
    lead_songs: ["Fight for Your Right"]
    notes: "Open all show — active only for FFYR lead vocal"
  11:
    label: "Bassist Vocal"
    type: vocal
    usage: backup_and_lead
    inactive_threshold_db: -35
    lead_songs: ["Kryptonite"]
    notes: "Tribute to Brad Arnold — mix with care on Kryptonite"
  12:
    label: "Keys Vocal"
    type: vocal
    usage: backup_and_lead
    inactive_threshold_db: -35
    lead_songs: []
    notes: "Confirm which songs have keys player on lead"
  13:
    label: "Bass"
    type: instrument
  15:
    label: "Keys"
    type: instrument
    paired_channel: 6
    notes: "Primary instrument — muted when Ken plays acoustic on ch 6"

frequency_fingerprints:
  Kick:            { primary: [40, 100],   secondary: [2000, 5000] }
  Drum Rack:       { primary: [100, 400],  secondary: [3000, 8000] }
  Floor Tom:       { primary: [80, 250],   secondary: [2000, 5000] }
  Acoustic Guitar: { primary: [100, 6000] }
  Guitar 1:        { primary: [200, 5000] }
  Guitar 2:        { primary: [200, 5000] }
  Lead Vocal:      { primary: [300, 4000], secondary: [1000, 4000] }
  Drum Vocal:      { primary: [300, 4000] }
  Bassist Vocal:   { primary: [300, 4000] }
  Keys Vocal:      { primary: [300, 4000] }
  Bass:            { primary: [60, 250],   secondary: [500, 1000] }
  Keys:            { primary: [200, 8000] }

band_overrides:
  global:
    notes: "Kick consistently runs heavy across all profiles — allow extra weight below 80Hz"
  AOR:
    notes: "Keys player runs slightly brighter — allow +1dB air vs template"
  Heavy Metal:
    frequency_targets:
      high_mid: +3

thresholds:
  recommendation_trigger_db: 3.0
  lufs_trigger_db: 2.0
  baseline_drift_trigger_db: 2.0
  rate_of_change_suppress_db: 3.0
  rate_of_change_window_s: 5
  rate_of_change_rms_db: 4.0
  rate_of_change_rms_window_s: 2
  suppression_duration_s: 60
  recommendation_cooldown_s: 60
  transition_grace_seconds: 30
  adjustment_detect_fader_db: 0.5
  adjustment_detect_eq_db: 0.5
  adjustment_detect_freq_hz: 10
